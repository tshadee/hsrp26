<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>test</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ── Page ──────────────────────────────────────────────────────────────── -->
  <main class="page">

    <header class="site-header">
      <div id="letter-mount" class="letter-mount" aria-label="Letter display"></div>
    </header>

  </main>

  <!-- ──  engine  ────────────────────────────────────────── -->
  <script type="module">
    import { SpritePool, LetterParent, WordParent } from './engine.js';

    const mount = document.getElementById('letter-mount');
    const mainPool = new SpritePool(mount, { maxSprites: 5000, spriteSize: 2 });

    const mainTextController = new WordParent('the quick brown fox jumps', './shapes/letters/', 14);

    mainPool.mutateTo(mainTextController);

    setTimeout(() => {
      mainPool.mutateTo(mainTextController.morphTo('over the lazy dog'));
    }, 2000);

    setTimeout(() => {
      mainPool.moveTo(550, 510);
    }, 4000);

    setTimeout(() => {
      mainPool.mutateTo(mainTextController.morphTo('THE QUICK BROWN FOX JUMPS'));
    }, 6000);

    setTimeout(() => {
      mainPool.mutateTo(mainTextController.morphTo('OVER THE LAZY DOG'));
    }, 8000);

    setTimeout(() => {
      mainPool.moveTo(1920/2,1080/2);
    }, 10000);

    setTimeout(() => {
      mainTextController.setFontSize(10);
      mainPool.mutateTo(mainTextController.morphTo('!@#$%^&*() -_=+[]{}|;:,.<>?/~`'));
    }, 12000);


  </script>

</body>
</html>
