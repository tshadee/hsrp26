<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hsrp26</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <nav class="nav-bar">
    <div class="nav-container">

        <div class="nav-left">
          <div class="nav-item" id="pool-hsrp-logo"></div>
        </div>

        <div class="nav-middle">
          <div class="nav-item" id="pool-nav-1"></div>
          <div class="nav-item" id="pool-nav-2"></div>
          <div class="nav-item" id="pool-nav-3"></div>
        </div>

        <div class="nav-right">
          <div class="nav-item" id="pool-nav-time"></div>
        </div>

    </div>
  </nav>

  <!-- ── Page ──────────────────────────────────────────────────────────────── -->
  <main class="hero">

    <header>
      <div id="hero-mount" class="hero-mount" aria-label="hero display"></div>
    </header>

  </main>

  <footer>
    <div class="footer-container">
    
    </div>
  </footer>

  <!-- ──  engine  ────────────────────────────────────────── -->
<script type="module">
    import { SpritePool, SpriteWrite, SpriteImage } from './js files/main.js';

    // ── Hero Pool ──
    const heroMount = document.getElementById('hero-mount');
    const heroPool = new SpritePool(heroMount, { maxSprites: 10000, spriteSize: 2});
    const heroPoolText = new SpriteWrite("welcome", 14).attach(heroPool);
    const heroPoolImage = new SpriteImage("hsrp-logo", 300).attach(heroPool);

    // ── Logo Pool ──
    const navLogoMount = document.getElementById('pool-hsrp-logo');
    const navLogoPool = new SpritePool(navLogoMount, { maxSprites: 10000, spriteSize: 1});
    const navLogoText = new SpriteWrite("hsrp26", 8).attach(navLogoPool);
    const navLogoImage = new SpriteImage("hsrp-logo", 50).attach(navLogoPool); // Set scale to 100px or whatever fits your nav

    // ── Navigation Pools ──
    const navMount1 = document.getElementById('pool-nav-1');
    const navPool1 = new SpritePool(navMount1, { maxSprites: 500, spriteSize: 1 });
    const navPool1Text = new SpriteWrite("navp1", 8).attach(navPool1);

    const navMount2 = document.getElementById('pool-nav-2');
    const navPool2 = new SpritePool(navMount2, { maxSprites: 500, spriteSize: 1 });
    const navPool2Text = new SpriteWrite("navp2", 8).attach(navPool2);

    const navMount3 = document.getElementById('pool-nav-3');
    const navPool3 = new SpritePool(navMount3, { maxSprites: 500, spriteSize: 1 });
    const navPool3Text = new SpriteWrite("navp3", 8).attach(navPool3);

    // ── Clock Pool ──
    const navMountTime = document.getElementById('pool-nav-time');
    const navPoolTime = new SpritePool(navMountTime, { maxSprites: 1000, spriteSize: 1});
    const navPoolTimeText = new SpriteWrite("00:00:00 am", 8).attach(navPoolTime);

    // Initial Mutations
    await heroPool.mutateTo(heroPoolImage);
    await navLogoPool.mutateTo(navLogoImage);
    await navPool1.mutateTo(navPool1Text);
    await navPool2.mutateTo(navPool2Text);
    await navPool3.mutateTo(navPool3Text);
    await navPoolTime.mutateTo(navPoolTimeText);

    let lastSecondUpdated = -1;

    function updateClock() {
      const now = new Date();
      const s = now.getSeconds();

      if (s % 5 === 0 && s !== lastSecondUpdated) {
        lastSecondUpdated = s;
        let h = now.getHours();
        const ampm = h >= 12 ? 'pm' : 'am';
        h = h % 12 || 12;
        const m = String(now.getMinutes()).padStart(2, '0');
        const sec = String(s).padStart(2, '0');
        const timeString = `${h}:${m}:${sec} ${ampm}`;
        
        navPoolTimeText.morphTo(timeString);
      }
    }
    setInterval(updateClock, 200);

    function updateLogo() {
      const logoTexts = ['hsrp.cc', 'hsrp26', 'x'];
      let index = 0;

      function recursionLogo() {
        let timeoutTime = 5000 + Math.random() * 5000;
        setTimeout(() => {
          if (index !== 2) {
            navLogoText.morphTo(logoTexts[index]);
          } else {
            // Master mutation to an Image Map
            navLogoPool.mutateTo(navLogoImage);
          }
          index = (index + 1) % logoTexts.length;
          recursionLogo();
        }, timeoutTime)
      }
      recursionLogo();
    }
    updateLogo();

    function cycleText() {
        const texts = [
          'hsrp26',
          'hsrp.cc',
          '0123456789\n!@#$%^&*() -_=+[]{}|;:,.<>?/~`',
          'the quick brown fox\njumps over the lazy dog',
          'THE QUICK BROWN FOX\nJUMPS OVER THE LAZY DOG',
          'This is a test website\nnot much to see yet',
          'There are some test strings cycling through',
          'Feel free to watch them morph',
          'A',
          'B',
          'C',
          'D',
          '10:00',
          '11:11',
          '12:34',
          '07:31'
        ];
  
        let index = 0;
  
        setInterval(() => {
          heroPoolText.morphTo(texts[index]);
          index = (++index) % texts.length;
        }, 3000);
    }

    cycleText();


  </script>
  <!-- <script src="./js files/marine-snow-physics.js"></script> -->

</body>
</html>
