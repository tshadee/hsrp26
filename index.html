<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>test</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ── Page ──────────────────────────────────────────────────────────────── -->
  <main class="page">

    <header class="site-header">
      <div id="letter-mount" class="letter-mount" aria-label="Letter display"></div>
    </header>

  </main>

  <!-- ──  engine  ────────────────────────────────────────── -->
  <script type="module">
    import { SpritePool, LetterParent, SpriteWrite } from './engine.js';

    const mount = document.getElementById('letter-mount');
    const mainPool = new SpritePool(mount, { maxSprites: 5000, spriteSize: 2 });

    const mainTextController = new SpriteWrite('the quick brown fox jumps\nover the lazy dog', './shapes/letters/', 14);

    mainPool.mutateTo(mainTextController);

    setTimeout(() => {
      mainPool.mutateTo(mainTextController.morphTo('THE QUICK BROWN FOX JUMPS\nOVER THE LAZY DOG'));
    }, 3000);

    setTimeout(() => {
      mainPool.mutateTo(mainTextController.morphTo('0123456789\n!@#$%^&*() -_=+[]{}|;:,.<>?/~`'));
    }, 6000);

    setTimeout(() => {
      mainTextController.setFontSize(10);
      mainPool.mutateTo(mainTextController.morphTo('hsrp.cc'));
      mainPool.moveTo(1920/2,50);
    }, 9000);



  </script>

</body>
</html>
