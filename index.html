<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>test</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ── Page ──────────────────────────────────────────────────────────────── -->
  <main class="page">

    <header class="site-header">
      <div id="letter-mount" class="letter-mount" aria-label="Letter display"></div>
    </header>

  </main>

  <!-- ──  engine  ────────────────────────────────────────── -->
  <script type="module">
    import { SpritePool, SpriteWrite } from './js files/engine.js';

    const mount = document.getElementById('letter-mount');
    const mainPool = new SpritePool(mount, { maxSprites: 2000, spriteSize: 2 });
    const textController = new SpriteWrite("Hello World!", './shapes/letters/NVMono/', 14).attach(mainPool);

    await mainPool.mutateTo(textController);

    function cycleText() {
        const texts = [
          'hsrp26',
          'hsrp26.cc',
          '0123456789\n!@#$%^&*() -_=+[]{}|;:,.<>?/~`',
          'the quick brown fox\njumps over the lazy dog',
          'THE QUICK BROWN FOX\nJUMPS OVER THE LAZY DOG',
          'This is a test website\nnot much to see yet',
          'There are some test strings cycling through',
          'Feel free to watch them morph',
          'A',
          'B',
          'C',
          'D',
          '10:00',
          '11:11',
          '12:34',
          '07:31'
        ];
  
        let index = 0;
  
        setInterval(() => {
          textController.morphTo(texts[index]);
          index = (++index) % texts.length;
        }, 3000);
    }

    cycleText();


  </script>
  <script src="./js files/marine-snow-physics.js"></script>

</body>
</html>
