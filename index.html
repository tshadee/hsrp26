<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>test</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ── Page ──────────────────────────────────────────────────────────────── -->
  <main class="page">

    <header class="site-header">
      <div id="letter-mount" class="letter-mount" aria-label="Letter display"></div>
    </header>

  </main>

  <!-- ──  engine  ────────────────────────────────────────── -->
  <script type="module">
    import { SpritePool, SpriteWrite } from './engine.js';

    const mount = document.getElementById('letter-mount');
    const mainPool = new SpritePool(mount, { maxSprites: 5000, spriteSize: 2 });
    const textController = new SpriteWrite("Hello World!", './shapes/letters/', 14).attach(mainPool);

    await mainPool.mutateTo(textController);

    setTimeout(() => {
      textController.morphTo('THE QUICK BROWN FOX JUMPS\nOVER THE LAZY DOG');
    }, 5000);

    setTimeout(() => {
      textController.morphTo('0123456789\n!@#$%^&*() -_=+[]{}|;:,.<>?/~`');
    }, 8000);

    setTimeout(() => {
      //mainTextController.setFontSize(10);
      textController.morphTo('hsrp.cc');
    }, 11000);

    setTimeout(() => {
      mainPool.moveTo(150,50);
    }, 14000);



  </script>

</body>
</html>
